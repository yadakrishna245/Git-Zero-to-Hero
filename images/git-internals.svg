<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
@keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.4); } 50% { box-shadow: 0 0 12px 4px rgba(249,115,22,0.2); } }
@keyframes flowRight { 0% { opacity: 0.3; transform: translateX(-3px); } 50% { opacity: 1; } 100% { opacity: 0.3; transform: translateX(3px); } }
.container { background: #1e293b; border-radius: 12px; padding: 30px; min-height: 360px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
.title { color: #f97316; font-size: 22px; font-weight: bold; animation: fadeIn 1s ease; }
.objects { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
.obj { border-radius: 10px; padding: 18px 22px; color: white; text-align: center; animation: fadeIn 0.8s ease backwards; }
.obj h3 { margin: 0 0 6px 0; font-size: 15px; }
.obj p { margin: 0; font-size: 11px; opacity: 0.8; }
.blob { background: #f97316; animation-delay: 0.2s; animation: fadeIn 0.8s ease 0.2s backwards, pulse 3s ease-in-out infinite; }
.tree { background: #3b82f6; animation-delay: 0.5s; }
.commit-obj { background: #10b981; animation-delay: 0.8s; }
.tag { background: #8b5cf6; animation-delay: 1.1s; }
.arrow { color: #94a3b8; font-size: 20px; animation: flowRight 1.5s ease-in-out infinite; }
.a2 { animation-delay: 0.4s; }
.a3 { animation-delay: 0.8s; }
.details { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.detail-box { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 16px; max-width: 160px; }
.detail-box h4 { color: #f97316; margin: 0 0 4px 0; font-size: 12px; }
.detail-box p { color: #94a3b8; margin: 0; font-size: 11px; line-height: 1.4; }
</style>
<div style="font-family: system-ui; padding: 20px;">
<div class="container">
<div class="title">Git Internals — Object Model</div>
<div class="objects">
<div class="obj blob"><h3>Blob</h3><p>File content</p></div>
<span class="arrow">→→</span>
<div class="obj tree"><h3>Tree</h3><p>Directory listing</p></div>
<span class="arrow a2">→→</span>
<div class="obj commit-obj"><h3>Commit</h3><p>Snapshot + meta</p></div>
<span class="arrow a3">→→</span>
<div class="obj tag"><h3>Tag</h3><p>Named reference</p></div>
</div>
<div class="details">
<div class="detail-box"><h4>Blob</h4><p>Stores raw file data. Same content = same SHA-1 hash.</p></div>
<div class="detail-box"><h4>Tree</h4><p>Maps names to blobs/trees. Represents a directory.</p></div>
<div class="detail-box"><h4>Commit</h4><p>Points to tree + parent. Stores author, message, timestamp.</p></div>
<div class="detail-box"><h4>Tag</h4><p>Named pointer to a commit. Used for releases.</p></div>
</div>
</div>
</div>
</div>
</foreignObject>
</svg>
