<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.container { background: #1e293b; border-radius: 12px; padding: 24px; min-height: 360px; display: flex; flex-direction: column; align-items: center; }
.title { color: #f97316; font-size: 20px; font-weight: bold; margin-bottom: 20px; animation: fadeIn 0.8s ease; }
.steps { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 650px; }
.step { display: flex; align-items: center; gap: 12px; animation: slideIn 0.6s ease backwards; }
.step:nth-child(1) { animation-delay: 0.2s; }
.step:nth-child(2) { animation-delay: 0.4s; }
.step:nth-child(3) { animation-delay: 0.6s; }
.step:nth-child(4) { animation-delay: 0.8s; }
.step:nth-child(5) { animation-delay: 1.0s; }
.step:nth-child(6) { animation-delay: 1.2s; }
.num { background: #f97316; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; flex-shrink: 0; }
.card { background: #334155; border-radius: 8px; padding: 10px 16px; flex: 1; display: flex; align-items: center; justify-content: space-between; }
.card-text { color: white; font-size: 13px; font-weight: 600; }
.card-cmd { color: #94a3b8; font-size: 11px; font-family: monospace; }
.merge-step .card { background: #10b981; animation: pulse 2s ease-in-out infinite; }
</style>
<div style="font-family: system-ui; padding: 20px;">
<div class="container">
<div class="title">Pull Request Workflow</div>
<div class="steps">
<div class="step"><div class="num">1</div><div class="card"><span class="card-text">Create feature branch</span><span class="card-cmd">git switch -c feature/login</span></div></div>
<div class="step"><div class="num">2</div><div class="card"><span class="card-text">Commit your changes</span><span class="card-cmd">git commit -m "Add login"</span></div></div>
<div class="step"><div class="num">3</div><div class="card"><span class="card-text">Push to remote</span><span class="card-cmd">git push -u origin feature/login</span></div></div>
<div class="step"><div class="num">4</div><div class="card"><span class="card-text">Open Pull Request</span><span class="card-cmd">gh pr create --fill</span></div></div>
<div class="step"><div class="num">5</div><div class="card"><span class="card-text">Code Review &amp; CI passes</span><span class="card-cmd">Reviewers approve ✓</span></div></div>
<div class="step merge-step"><div class="num">6</div><div class="card"><span class="card-text">Merge to main 🎉</span><span class="card-cmd">Squash and merge</span></div></div>
</div>
</div>
</div>
</div>
</foreignObject>
</svg>
