<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes flowRight { 0% { transform: translateX(-5px); opacity: 0.3; } 50% { opacity: 1; } 100% { transform: translateX(5px); opacity: 0.3; } }
.container { background: #1e293b; border-radius: 12px; padding: 30px; min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.title { color: #f97316; font-size: 22px; font-weight: bold; margin-bottom: 30px; animation: fadeIn 1s ease; }
.flow { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
.box { padding: 16px 20px; border-radius: 8px; color: white; font-weight: 600; font-size: 14px; text-align: center; animation: fadeIn 1s ease backwards; }
.box1 { background: #f97316; animation-delay: 0.2s; }
.box2 { background: #3b82f6; animation-delay: 0.4s; }
.box3 { background: #10b981; animation-delay: 0.6s; }
.box4 { background: #8b5cf6; animation-delay: 0.8s; }
.arrow { color: #94a3b8; font-size: 20px; animation: flowRight 1.5s ease-in-out infinite; }
.arrow2 { animation-delay: 0.3s; }
.arrow3 { animation-delay: 0.6s; }
.desc { color: #94a3b8; font-size: 12px; margin-top: 6px; }
</style>
<div style="font-family: system-ui; padding: 20px;">
<div class="container">
<div class="title">Git Workflow</div>
<div class="flow">
<div class="box box1">Working<br/><span class="desc">Directory</span></div>
<span class="arrow">→→→</span>
<div class="box box2">Staging<br/><span class="desc">git add</span></div>
<span class="arrow arrow2">→→→</span>
<div class="box box3">Local Repo<br/><span class="desc">git commit</span></div>
<span class="arrow arrow3">→→→</span>
<div class="box box4">Remote<br/><span class="desc">git push</span></div>
</div>
</div>
</div>
</div>
</foreignObject>
</svg>
